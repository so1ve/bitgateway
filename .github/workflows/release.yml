name: Release

on:
  push:
    branches: [main]

jobs:
  release-plz-release:
    name: Publish crates and GitHub releases
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
      id-token: write
    outputs:
      bitgateway_tag: ${{ steps.detect-bitgateway-release.outputs.tag }}
    concurrency:
      group: release-plz-release
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libxdo-dev \
            librsvg2-dev \
            patchelf

      - name: Run release-plz release
        id: release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Detect bitgateway release
        id: detect-bitgateway-release
        env:
          RELEASES_CREATED: ${{ steps.release-plz.outputs.releases_created }}
          RELEASES: ${{ steps.release-plz.outputs.releases }}
        run: |
          if [ "$RELEASES_CREATED" != "true" ]; then
            echo "tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          tag="$(jq -r '.[]? | select(.package_name == "bitgateway") | .tag // empty' <<< "${RELEASES:-[]}")"

          if [ -z "$tag" ]; then
            echo "tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  release-plz-pr:
    name: Open release PR
    runs-on: ubuntu-latest
    if: github.repository_owner == 'so1ve'
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Run release-plz release-pr
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ github.token }}

  bundle-release-assets:
    name: Bundle ${{ matrix.name }}
    needs: release-plz-release
    if: needs.release-plz-release.outputs.bitgateway_tag != ''
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-22.04
            platform: linux
            package_type: appimage
          - name: macos
            os: macos-latest
            platform: macos
            package_type: dmg
          - name: windows-x86_64
            os: windows-latest
            platform: windows
            package_type: nsis

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-plz-release.outputs.bitgateway_tag }}

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libxdo-dev \
            libfuse2 \
            librsvg2-dev \
            patchelf

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@v1.18.1
        with:
          version: "1.18.1"

      - name: Install Dioxus CLI from source
        if: runner.os == 'Linux'
        run: cargo binstall dioxus-cli@0.7.6 --no-confirm --locked --strategies compile
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Install Dioxus CLI
        if: runner.os != 'Linux'
        run: cargo binstall dioxus-cli@0.7.6 --no-confirm --locked
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Bundle desktop app
        working-directory: crates/bitgateway
        run: dx bundle --release --platform ${{ matrix.platform }} --package-types ${{ matrix.package_type }} --locked

      - name: Add Windows portable app
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dist = Join-Path "${{ github.workspace }}" "dist"
          $portable = Join-Path "${{ github.workspace }}" "target/dx/bitgateway/bundle/windows/bitgateway.exe"
          $portableAsset = Join-Path $dist "bitgateway-windows-x86_64-portable.exe"

          if (!(Test-Path $portable)) {
            throw "Windows portable executable not found: $portable"
          }

          New-Item -ItemType Directory -Path $dist -Force | Out-Null
          Copy-Item -Path $portable -Destination $portableAsset -Force

      - name: Prepare release assets
        shell: pwsh
        run: |
          $dist = Join-Path "${{ github.workspace }}" "dist"

          if (!(Test-Path $dist)) {
            throw "dist directory not found: $dist"
          }

          $bundles = @(Get-ChildItem -Path $dist -Force -File)
          if ($bundles.Count -eq 0) {
            throw "dist directory is empty after preparing release assets: $dist"
          }

          Get-ChildItem -Path $dist -Force -File | Format-Table -AutoSize FullName, Length, LastWriteTime

      - name: Upload bundle to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release-plz-release.outputs.bitgateway_tag }}
          files: dist/*
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
