name: Release

on:
  push:
    branches: [main]

jobs:
  release-plz-release:
    name: Publish crates and GitHub releases
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
      id-token: write
    outputs:
      bitgateway_released: ${{ steps.detect-bitgateway-release.outputs.released }}
      bitgateway_tag: ${{ steps.detect-bitgateway-release.outputs.tag }}
    concurrency:
      group: release-plz-release
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libxdo-dev \
            librsvg2-dev \
            patchelf

      - name: Run release-plz release
        id: release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Detect bitgateway release
        id: detect-bitgateway-release
        env:
          RELEASES_CREATED: ${{ steps.release-plz.outputs.releases_created }}
          RELEASES: ${{ steps.release-plz.outputs.releases }}
        run: |
          if [ "$RELEASES_CREATED" != "true" ]; then
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          tag="$(jq -r '.[]? | select(.package_name == "bitgateway") | .tag // empty' <<< "${RELEASES:-[]}")"

          if [ -z "$tag" ]; then
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "released=true" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  release-plz-pr:
    name: Open release PR
    runs-on: ubuntu-latest
    if: github.repository_owner == 'so1ve'
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Run release-plz release-pr
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ github.token }}

  bundle-release-assets:
    name: Bundle ${{ matrix.name }}
    needs: release-plz-release
    if: needs.release-plz-release.outputs.bitgateway_released == 'true'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-22.04
          - name: macos
            os: macos-latest
          - name: windows-x86_64
            os: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-plz-release.outputs.bitgateway_tag }}

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libxdo-dev \
            librsvg2-dev \
            patchelf

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@v1.18.1
        with:
          version: "1.18.1"

      - name: Install Dioxus CLI
        run: cargo binstall dioxus-cli@0.7.6 --no-confirm --locked
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Bundle desktop app
        working-directory: crates/bitgateway
        run: dx bundle --release --platform desktop --out-dir ../../dist

      - name: Archive bundle
        shell: pwsh
        run: |
          if (!(Test-Path "dist")) {
            throw "dist directory not found"
          }
          Compress-Archive -Path "dist/*" -DestinationPath "bitgateway-${{ matrix.name }}.zip" -Force

      - name: Upload bundle to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-plz-release.outputs.bitgateway_tag }}
          files: bitgateway-${{ matrix.name }}.zip
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
